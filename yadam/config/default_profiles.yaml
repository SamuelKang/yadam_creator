# yadam/config/default_profiles.yaml
era_profiles:
  joseon_yadam:
    prefix: |
      배경: 조선시대. 의복과 소품은 조선시대 양식. 가상의 인물.
    safety: |
      안전 지침: 노출 없음, 선정성 없음, 과도한 폭력/유혈/시신의 직접 묘사 없음. 긴장감은 조명과 분위기로 표현.

  modern_senior_story:
    prefix: |
      배경: 현대 한국. 시니어 사연. 가상의 인물.
    safety: |
      안전 지침: 노출 없음, 선정성 없음. 상해/의료적 장면은 직접 묘사 대신 분위기와 표정으로 표현. 자극적 표현 금지.

style_profiles:
  ghibli_joseon:
    suffix: |
      화풍: warm hand-painted animation look inspired by classic Japanese cel animation, soft watercolor background texture,
      gentle rim lighting, expressive but natural faces, non-photoreal, cinematic composition, 16:9, 텍스트 없음.
      만화 패널/컷 분할/말풍선/대사/자막/캡션/간판 글씨 없음.

  ghibli_joseon_char:
    suffix: |
      화풍: hand-painted cel animation character style, warm and soft palette, delicate ink-like outlines,
      simple but expressive facial features, subtle cloth folds, non-photoreal, 텍스트 없음.
      만화 패널/컷 분할/말풍선/대사/자막/캡션/간판 글씨 없음.

  ghibli_joseon_clip:
    suffix: |
      화풍: 16:9, hand-painted animation scene style, soft atmospheric perspective, warm color grading,
      gentle brush texture, expressive silhouette acting, non-photoreal cinematic illustration.

  k_webtoon:
    suffix: |
      화풍: 한국 웹툰 스타일, 선명한 선과 색, 시네마틱 조명, 16:9, 텍스트 없음.
      만화 패널/컷 분할/말풍선/대사/자막/캡션/간판 글씨 없음.

  k_webtoon_char:
    suffix: |
      화풍: 한국 웹툰 기반의 정돈된 캐릭터 디자인풍(B군), 매끈한 클린 라인, 균일한 2D 셀 셰이딩, 선명한 색 분리, 과한 질감/오염/거친 수묵 브러시 금지, 텍스트 없음.
      만화 패널/컷 분할/말풍선/대사/자막/캡션/간판 글씨 없음.

  k_webtoon_clip:
    suffix: |
      화풍: 16:9, Korean historical manhwa style, 2D digital illustration, visible ink outlines, full-color cel shading,
      simplified comic surfaces, flat color planes, graphic shadow shapes, stylized faces and hands, non-photoreal webtoon rendering.

  photoreal_cinematic:
    suffix: |
      화풍: 현실 사진풍, 영화적 라이팅, 자연스러운 피부 질감, 16:9, 텍스트 없음.

  warm_illustration:
    suffix: |
      화풍: 따뜻한 감성 일러스트, 부드러운 질감, 과장 없는 표정, 16:9, 텍스트 없음.
